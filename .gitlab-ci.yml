# =============================================================================
# goodfunds-docs (GoodFunds Help Center) — new-deploy (image-basiert), Stage + Prod
# =============================================================================
# Nutzt die geteilten Templates aus devops/deployment@new-deploy:
#   build (buildx -> registry) -> deploy-stage (manuell) -> verify-stage
#   -> deploy-prod (manuell, gated PROD_ENABLED) -> verify-prod
#
# Single-Image-App (nur `app`, kein nginx): stateless Next.js 16 (standalone),
# keine DB, keine Files/S3. Die App liegt im Monorepo unter apps/help-center
# (BUILD_CONTEXT unten). Veröffentlichung via Labels in docker-compose.new-deploy.yml.
# Domain (main-Branch): <projekt>.<zone>.<env>.gooddev.de
#   Stage: goodfunds-docs.hh.stage.gooddev.de   Prod: goodfunds-docs.hh.prod.gooddev.de
#
# === In GitLab-UI zu setzen (Settings -> CI/CD -> Variables) ===
#   PROD_DEPLOY_KEY        (File, protected)        SSH-Key root@prod13 — nötig für deploy-prod
#   APPENV_OPENAI_API_KEY  (masked/protected)       -> Container-Env OPENAI_API_KEY (KI-Chat)
#   # optional, sonst Defaults:
#   APPENV_OPENAI_MODEL        (env-scoped)         -> OPENAI_MODEL
#   APPENV_OPENAI_EMBED_MODEL  (env-scoped)         -> OPENAI_EMBED_MODEL
#   (PROJECT_BASE_URL wird vom Deploy automatisch gesetzt = eigene Domain.)
# =============================================================================

include:
  - project: "devops/deployment"
    ref: "new-deploy" # bis Merge nach main
    file: "/templates/gitlab-jobs/main-image-build.yml"
  - project: "devops/deployment"
    ref: "new-deploy"
    file: "/templates/gitlab-jobs/main-image-deploy.yml"

variables:
  COMPOSE_SRC: "docker-compose.new-deploy.yml"
  CI_stage_server: "stage13" # Orchestrator-Runner-Tag
  DEPLOY_ENV: "stage" # deploy-prod überschreibt -> prod
  DEPLOY_ZONE: "hh" # proxy13-Namespace -> <projekt>.hh.<env>.gooddev.de
  # PROD scharf schalten (deploy-prod/verify-prod bleiben dennoch manuell + brauchen
  # PROD_DEPLOY_KEY). Auf "false" setzen, um Prod komplett zu gaten.
  PROD_ENABLED: "true"

# Nur das app-Image bauen. Build-Context ist der App-Ordner im Monorepo.
build-image:
  extends: .build-image
  parallel:
    matrix:
      - IMAGE: app
        DOCKERFILE: apps/help-center/Dockerfile
        BUILD_CONTEXT: apps/help-center

# --- verify: Redirects folgen ------------------------------------------------
# Die i18n-Middleware leitet die bare Domain `/` per 307 auf `/de` um (dort 200).
# Das Template-Script prüft strikt auf HTTP 200 OHNE Redirects zu folgen und würde
# daher fehlschlagen ("liefert nicht 200"). Wir überschreiben nur das `script` von
# verify-stage/-prod und folgen mit `curl -sSL` bis zum finalen 200 (needs/rules/
# tags/stage bleiben aus dem Template). Gleiche Retry-/Banner-Logik wie im Original.
.verify_follow_redirects: &verify_follow_redirects
  - |
    [ -n "$DEPLOY_DOMAINS" ] || { echo "FEHLER: DEPLOY_DOMAINS leer (dotenv aus dem Deploy fehlt)"; exit 1; }
    FAIL=0; OKLIST=""
    for url in $DEPLOY_DOMAINS; do
      ok=""
      for i in 1 2 3 4 5; do
        # -L: 307 auf /<locale> folgen → finaler Status soll 200 sein.
        code="$(curl -sSL -o /dev/null -w '%{http_code}' --max-time 20 "$url" || true)"
        echo "  $url  Versuch $i: HTTP $code"
        [ "$code" = "200" ] && { ok=1; break; }
        sleep 8
      done
      if [ -n "$ok" ]; then OKLIST="${OKLIST}  ${url}\n"; else echo "FEHLER: $url liefert nicht 200 (auch nach Redirect)"; FAIL=1; fi
    done
    echo ""; echo "============================================================"
    echo "  VEROEFFENTLICHT (${CI_PROJECT_NAME}) — Zone ${DEPLOY_ZONE}.${DEPLOY_ENV}"
    printf "$OKLIST"
    echo "============================================================"
    [ "$FAIL" = "0" ] || exit 1

verify-stage:
  script: *verify_follow_redirects

verify-prod:
  script: *verify_follow_redirects
